<!DOCTYPE html>

        <meta charset="utf-8" />
        <title>Protected Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root {
                --bg: #f4f6f9;
                --bg2: #ffffff;
                --bg3: #f0f2f6;
                --bg4: #e4e8ef;
                --border: rgba(0,0,0,0.08);
                --border2: rgba(0,0,0,0.15);
                --text1: #1a1f2e;
                --text2: #5a6478;
                --text3: #9aa3b4;
                --accent: #2563eb;
                --accent2: #1d4ed8;
                --radius: 10px;
                --radius-lg: 14px;
            }
            * { box-sizing: border-box; margin: 0; padding: 0; }
            .staticrypt-html, .staticrypt-body { height: 100%; margin: 0; }
            .staticrypt-body {
                font-family: 'Noto Sans KR', sans-serif;
                background: var(--bg);
                color: var(--text1);
                -webkit-font-smoothing: antialiased;
            }
            .staticrypt-content {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: var(--bg);
            }
            .staticrypt-page {
                width: 100%;
                max-width: 400px;
                padding: 0 20px;
                margin: auto;
                box-sizing: border-box;
            }
            /* 로고 헤더 */
            .login-header {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 12px;
                margin-bottom: 28px;
            }
            .login-logo-mark {
                width: 36px; height: 36px; border-radius: 8px;
                background: var(--accent);
                display: flex; align-items: center; justify-content: center;
                font-weight: 700; font-size: 14px; color: #fff;
                font-family: 'IBM Plex Mono', monospace;
                flex-shrink: 0;
            }
            .login-logo-text { font-weight: 700; font-size: 15px; color: var(--text1); line-height: 1.3; }
            .login-logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
            /* 카드 */
            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: var(--bg2);
                border: 1px solid var(--border);
                border-radius: var(--radius-lg);
                padding: 30px 28px 26px;
                box-shadow: 0 4px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.05);
            }
            .staticrypt-instructions {
                margin-bottom: 20px;
                text-align: center;
            }
            .staticrypt-title {
                font-size: 16px;
                font-weight: 600;
                color: var(--text1);
                margin-bottom: 5px;
            }
            .staticrypt-instructions p:last-child {
                font-size: 12px;
                color: var(--text3);
            }
            .staticrypt-hr {
                border: none;
                border-top: 1px solid var(--border);
                margin: 0 0 20px;
            }
            .staticrypt-password-container {
                position: relative;
                width: 100%;
                margin: 0 0 12px;
                box-sizing: border-box;
            }
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                width: 100%;
                background: var(--bg3);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                color: var(--text1);
                font-size: 13px;
                font-family: 'IBM Plex Mono', monospace;
                padding: 11px 42px 11px 14px;
                outline: none;
                transition: border-color 0.15s, background 0.15s;
                box-sizing: border-box;
                letter-spacing: 0.03em;
            }
            .staticrypt-form input[type="password"]:focus,
            .staticrypt-form input[type="text"]:focus {
                border-color: var(--accent);
                background: #fff;
            }
            .staticrypt-form input::placeholder { color: var(--text3); letter-spacing: 0; font-family: 'Noto Sans KR', sans-serif; }
            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 16px;
                width: 16px;
                opacity: 40%;
                padding: 0;
                position: absolute;
                right: 13px;
                top: 50%;
                transform: translateY(-50%);
                transition: opacity 0.15s;
            }
            .staticrypt-toggle-password-visibility:hover { opacity: 65%; }
            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                border: none;
                border-radius: var(--radius);
                background: var(--accent);
                color: #fff;
                font-size: 13px;
                font-weight: 600;
                font-family: 'Noto Sans KR', sans-serif;
                padding: 11px;
                cursor: pointer;
                transition: background 0.15s;
                letter-spacing: 0.03em;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: var(--accent2);
                outline: none;
            }
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 12px;
                font-size: 12px;
                color: var(--text2);
                gap: 8px;
                cursor: pointer;
            }
            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.2);
                accent-color: var(--accent);
                margin-right: 0;
            }
            .login-footer {
                text-align: center;
                margin-top: 18px;
                font-size: 11px;
                color: var(--text3);
                font-family: 'IBM Plex Mono', monospace;
            }
            .hidden { display: none !important; }
            .staticrypt-spinner-container {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg);
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 32px;
                height: 32px;
                border: 3px solid var(--bg4);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin 0.75s linear infinite;
            }
            @keyframes spin { 100% { transform: rotate(360deg); } }
            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] { font-size: 14px; }
            }
        </style>
    </head>
